<!DOCTYPE html>
<head>
<title>Mutah Airlines</title>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
    text-align: center;
}

.wrapper {
    width: 90%;
    margin: 0 auto;
}

header {
    width: 100%;
    height: 80px; /* Adjusted the height */
    background: #0070ff;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
}

.logo {
    float: left;
}

.logo img {
    height: 80px; /* Reduced the height */
    width: 80px;  /* Reduced the width */
}

nav {
    float: right;
    line-height: 80px; /* Same as header height */
}

nav a {
    text-decoration: none;
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    letter-spacing: 0px;
    font-size: 20px;
    color: #ffff;
    padding: 28px 5px;
    margin: 0 1px;
}

nav a:hover {
    background: #0004ff;
    color:#ffff;
	cursor: pointer; /* Add pointer for hover */
}

.navbtn {
    background-color: #0070ff;
    color: #ffff;
    border-color: #ffff;
    height: 80px;
    width: auto;
    font-size: 20px;
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    border-width: 0px;
    cursor: pointer; /* Add pointer for hover */
}

.navbtn:hover {
    background-color: #0004ff; /* Change background on hover */
	color:#ffff;
}
.banner-container {
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            transition: max-height 0.5s ease;
            z-index: 999;
        }

        .banner-image {
            width: 100%;
            display: block;
        }
		
		   .collapsed {
            max-height: 0;
        }
		
		 .expanded {
            max-height: 500px; /* Adjust based on the image height */
        }
		
		        /* To make sure content starts below the banner */
        .content {
            padding-top: 500px; /* Same as the banner height */
            height: 1500px; /* Just to add scrollable content */
        }
.img {
    width: 20%;
    height: 20%;
}

.dark-mode {
  background-color: #3e3e42;
  color: #ffff;
}

.flight-type {
padding: 35px;
text-align: center;
font-size:30px;
}
.airports{
padding-top: 25px;
padding-bottom: 15px;
text-align: center;
}

.dateNpassengers{
padding-bottom: 25px;
}

.name {
padding-top: 25px;
text-align: center;
}

.mobile-no{
padding-top: 25px;
padding-bottom: 35px;
text-align: center;
}

.promos
{
padding-top: 15px;
padding-bottom: 25px;
}

.btns {
    padding: 30px 0;
    text-align: center;
}

.btns input[type="submit"],
.btns input[type="reset"] {
    background-color:  #0070ff;
    color: white;
    border: none;
	padding-top: 0px;
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
    margin: 0 15px;
    border-radius: 5px;
}

.btns input[type="submit"]:hover,
.btns input[type="reset"]:hover {
    background-color:  #0004ff;
}

</style>
</head>
<body>
        <div class="box-area">
            <header>
                <div class="wrapper">
                    <div class="logo">
                     <a href='home.html'><img src='https://i.postimg.cc/LgSR94Xv/pngtree-an-aircraft-is-pictured-on-top-of-a-circular-circle-with-vector-png-image-7054214.png' alt='Airplane logo'/></a>
                    </div>
                    <nav>
                    <a href="home.html">Home</a>
                    <a href="booking.html">Booking</a>
                    <a href="cargo.html">Cargo</a>
                    <a href="aboutus.html">About us</a>
                    <button class="navbtn" onclick="darkfun()">Dark mode</button>
                    </nav>
                </div>
            </header>    
            </div>
 <div id="banner" class="banner-container expanded">
        <img src='https://i.postimg.cc/3Jq5MkKy/booking.png' alt='booking'/>
    </div>

    <div class="content">
        <h2 style="padding-bottom:30px">The world is your oyster. Book your flight</h2>
        <div class="flight-type">
		    <input type="radio" name="flight-type" value="one-way">One Way 
            <input type="radio" name="flight-type" value="return">Return
		</div>
		<div class="airports">
        <input type="text" id="location" name="location" maxlength="30" pattern="[A-Za-z]" placeholder="From" size="30">
        <input type="text" id="destination" name="destination" maxlength="30" pattern="[A-Za-z]" placeholder="To" size="30">
		<select name="seating" id="seating">
            <option value="" disabled selected>Class</option>
            <option value="economy">Economy Class</option>
            <option value="business">Business Class</option>
        </select>
		</div>
		
		<div class="dateNpassengers">
        <input type="text" id="date" name="departing" maxlength="10" pattern="^(0[1-9]|[12][0-9]|3[01])/(0[1-9]|1[0-2])/\d{4}$" placeholder="Departing Date (DD/MM/YYYY)" size="30">
        <input type="text" id="date" name="returning" maxlength="10" pattern="^(0[1-9]|[12][0-9]|3[01])/(0[1-9]|1[0-2])/\d{4}$" placeholder="Returning Date (DD/MM/YYYY)" size="30">
		<input type="text" id="passengers" name="Passengers" maxlength="1" pattern="[1-9]" placeholder="Passengers" size="12">
		</div>
		
		<div class="name">
        <label for="firstname">FIRST NAME:</label>
        <input type="text" id="firstname" name="firstname" maxlength="30" pattern="[A-Za-z]" placeholder="Enter first name" size="30">
		<br>
		<br>
        <label for="lastname">LAST NAME:</label>
        <input type="text" id="lastname" name="lastname" maxlength="30" pattern="[A-Za-z]" placeholder="Enter last name" size="30">
		</div>
		
		<div class="mobile-no">
            <label for="mobile-no">MOBILE NO:</label>
            <input type="text" id="mobile-no" name="mobile-no" maxlength="10" pattern="[0-9]" placeholder="Enter your mobile number" size="30">
        </div>
		
		<div class="adress">
            <label for="address">ADDRESS:</label>
            <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your address"></textarea>
        </div>
		
		<div class="promos">
		<label for="Promo">Promotional Offers:</label>
		<input type="text" id="promo" name="promo" maxlength="25" placeholder="Promotional Code" size="15">
		</div>
		
		  <div class="btns">
          <input type="reset" value="Reset">
          <input type="submit"  value="Submit">
           </div>
	</div>
	
	

    <script>
        let lastScrollTop = 0;
        const banner = document.getElementById('banner');

        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            if (scrollTop > lastScrollTop) {
                // Scrolling down
                banner.classList.add('collapsed');
                banner.classList.remove('expanded');
            } else {
                // Scrolling up
                banner.classList.remove('collapsed');
                banner.classList.add('expanded');
            }

            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // Prevent negative scrolling
        });
    </script>
	<script>
        function darkfun() {
           var element = document.body;
           element.classList.toggle("dark-mode");
        }
    </script>

</body>
